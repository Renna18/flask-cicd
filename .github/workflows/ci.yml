name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  check-code:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: check-code
    permissions:
      contents: read
      packages: write

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
            IMAGE_NAME=$(echo "ghcr.io/renna18/flask-cicd" | tr '[:upper:]' '[:lower:]')
            sudo docker pull $IMAGE_NAME:latest
            sudo docker stop my-app || true
            sudo docker rm my-app || true
            sudo docker run -d --name my-app -p 80:5000 $IMAGE_NAME:latest
            echo "Deployed!"

      - name: Health check
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }}/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then 
            echo "App is live!"
          else 
            echo "App returned: $STATUS but container is running"
          fi